resources:
  jobs:
    mom_demo_job:
      name: "mom_demo_live_data"
      # Pipeline must be running in continuous mode BEFORE triggering this job.
      # Start it with: databricks bundle run mom_pipeline
      # Stop it after demo: databricks pipelines stop <pipeline_id>
      tasks:
        # Step 1: Generate batch files + stream events in parallel
        - task_key: generate_batch_files
          notebook_task:
            notebook_path: /Workspace/Users/tanner.waggoner@databricks.com/mom_data_generation/02_live_batch_generator
            source: WORKSPACE
          environment_key: default
          timeout_seconds: 300

        - task_key: generate_stream_events
          notebook_task:
            notebook_path: /Workspace/Users/tanner.waggoner@databricks.com/mom_data_generation/03_live_stream_producer
            source: WORKSPACE
          environment_key: default
          timeout_seconds: 300

        # Step 2: Wait for pipeline to process new data
        # Pipeline is running continuously and picks up files automatically.
        # Wait 3 minutes to allow full processing through all 4 layers.
        - task_key: wait_for_processing
          depends_on:
            - task_key: generate_batch_files
            - task_key: generate_stream_events
          notebook_task:
            notebook_path: /Workspace/Users/tanner.waggoner@databricks.com/mom_data_generation/wait_for_processing
            source: WORKSPACE
          environment_key: default
          timeout_seconds: 300

        # Step 3: Measure latency
        - task_key: check_latency
          depends_on:
            - task_key: wait_for_processing
          notebook_task:
            notebook_path: /Workspace/Users/tanner.waggoner@databricks.com/mom_data_generation/04_latency_monitor
            source: WORKSPACE
          environment_key: default
          timeout_seconds: 300

      environments:
        - environment_key: default
          spec:
            client: "1"

      queue:
        enabled: true
