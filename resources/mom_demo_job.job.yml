resources:
  jobs:
    mom_demo_job:
      name: "mom_demo_live_data"
      tasks:
        # Step 1: Start pipeline in continuous mode (idempotent — no-op if already running)
        - task_key: start_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.mom_pipeline.id}
            full_refresh: false
          timeout_seconds: 600

        # Step 2: Generate stream events (pipeline picks them up live on 500ms cadence)
        - task_key: generate_stream_events
          depends_on:
            - task_key: start_pipeline
          notebook_task:
            notebook_path: /Workspace/Users/tanner.waggoner@databricks.com/mom_data_generation/03_live_stream_producer
            source: WORKSPACE
          environment_key: default
          timeout_seconds: 300

        # Step 3: Measure latency (ingest → gold)
        - task_key: check_latency
          depends_on:
            - task_key: generate_stream_events
          notebook_task:
            notebook_path: /Workspace/Users/tanner.waggoner@databricks.com/mom_data_generation/04_latency_monitor
            source: WORKSPACE
          environment_key: default
          timeout_seconds: 300

      environments:
        - environment_key: default
          spec:
            client: "1"

      queue:
        enabled: true
